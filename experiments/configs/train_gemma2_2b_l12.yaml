# Phase 2 training config — Gemma-2-2B, layer 12 (ADR-0004; sparsify 1.3.0).
# The real custom SAE + skip-transcoder run, on the SAME model/layer as the Phase-1 reproduction
# (gemma2_2b_reproduce.yaml) so Phase-3 can compare custom coders against the Gemma Scope reference.
#
# ONE YAML serves BOTH coders: the CLI `--kind {sae,transcoder}` flag flips
# transcode/skip_connection (ADR-0004); width (=> num_latents) and k (=> TopK L0) are held FIXED
# here so the SAE and the skip-transcoder are a fair head-to-head. Consumed by
# microscope.saes.train.coder_config_dict (extra='allow' => width/k/etc. are read here).
#
# COST (RULES.md C2/C4): a Gemma-2-2B training run is cost-gated (~$5/90 min each, ADR-0004); there
# are TWO runs (SAE + transcoder). n_tokens below is a MODEST starting budget — the exact token
# budget is finalized in Phase-2 unit 3 under the $30 cap. If either run threatens the cap, STOP and
# present options as a Gate. Smoke on train_pythia70m_smoke.yaml FIRST (R1/C4).
name: train_gemma2_2b_l12
model: google/gemma-2-2b
layer: 12                            # same layer as the reproduction; sparsify hooks from layers=[12]
hookpoint: null                      # layers-only: sparsify derives the resid hook from layers=[12]
                                     # (unit-2 verified on Pythia; the Phase-1 TL name is NOT a sparsify
                                     # HF-module path and would fail to resolve)
dataset: NeelNanda/pile-10k          # small + ungated + already cached; sliced to n_tokens. (monology/
                                     # pile-uncopyrighted is ~800GB and would fully download non-streamed)
n_tokens: 10_000_000                 # MODEST start; exact budget is cost-gated in unit 3 (see header)
seed: 0

# --- sparsify SaeConfig / TrainConfig settings (ADR-0004 §"E4 verification results") ---
# width => SaeConfig.num_latents. 16384 ≈ the Gemma Scope 16k width, for a comparable reference.
width: 16384
# k => SaeConfig.k, the exact L0 under TopK. k=64 is comparable to the Gemma Scope L0≈82 reference;
# SAE and transcoder MUST share this k (ADR-0004).
k: 64
activation: topk                     # sparsify SaeConfig.activation: 'topk' (k = exact L0) | 'groupmax'
batch_size: 16
lr: 1.0e-4
save_dir: outputs/coders             # Sae.save_to_disk target dir; run subfolder = run_name
